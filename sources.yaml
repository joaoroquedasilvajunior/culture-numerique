# Manifeste des sources de données mobilisées par l'Observatoire de la souveraineté culturelle numérique.
# Chaque entrée décrit un tableau ISQ attendu, son URL permanente, sa classification,
# et la fonction d'extraction qui le transforme en JSON normalisé.
#
# Convention de nommage : on accepte les noms tels qu'ils sont téléchargés de l'ISQ ; le pipeline
# repère les fichiers via un motif `file_pattern` (glob). Si plusieurs fichiers correspondent,
# le plus récent (selon mtime) est retenu, et le ledger trace lequel a été utilisé.
#
# Les URL sont indicatives : elles pointent vers les fiches ISQ correspondantes. Le pipeline ne
# les utilise pas pour télécharger automatiquement (l'accès est manuel).

# Dossier où le pipeline cherche les fichiers .xlsx ISQ. Chemin relatif à la racine du dépôt,
# ou absolu. Par défaut : ../Données Québec/ (un dossier au-dessus du dépôt) — c'est l'organisation
# recommandée : tu télécharges les fichiers ISQ dans Données Québec/, le pipeline les y trouve,
# pas de duplication, pas de divergence.
# Pour un setup self-contained classique, mettre simplement : raw_data_dir: "data/raw"
raw_data_dir: "../Données Québec"

sources:

  part_qc:
    label: "Part des interprètes du Québec dans la consommation d'enregistrements musicaux"
    file_pattern: "Part des interprètes*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/part-interpretes-quebec-consommation-enregistrements-musicaux"
    classification: "OCCQ — données hebdomadaires"
    extractor: extract_part_qc
    axe_tdb: ["consommation"]

  volume_musique:
    label: "Consommation d'enregistrements musicaux selon le type de produit"
    file_pattern: "Consommation d'enregistrements musicaux*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/consommation-enregistrements-musicaux-type-produit"
    classification: "OCCQ — données hebdomadaires"
    extractor: extract_volume_musique
    axe_tdb: ["consommation", "presence"]

  cinema_pays:
    label: "Résultats d'exploitation des établissements cinématographiques selon le pays d'origine des films"
    file_pattern: "Résultats d'exploitation des établissements*pays d'origine*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/resultats-exploitation-cinemas-pays-origine"
    classification: "OCCQ — données hebdomadaires"
    extractor: extract_cinema_pays
    axe_tdb: ["consommation"]

  palmares_top20:
    label: "Palmarès des enregistrements musicaux"
    file_pattern: "Palmarès des enregistrements*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/palmares-enregistrements-musicaux"
    classification: "OCCQ — cumulatif annuel"
    extractor: extract_palmares
    axe_tdb: ["decouvrabilite"]

  evolution_stats:
    label: "Évolution de statistiques clés de la culture et des communications"
    file_pattern: "Évolution de statistiques clés*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/evolution-statistiques-cles-culture-communications"
    classification: "OCCQ — séries annuelles 2002-2025"
    extractor: extract_evolution
    axe_tdb: ["presence", "ecosysteme"]

  emplois_eerh:
    label: "Emplois salariés dans certaines industries de la culture et des communications (EERH)"
    file_pattern: "Emplois salariés*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/2576"
    classification: "SCIAN 2022 — désaisonnalisé, MM3"
    extractor: extract_emplois_eerh
    axe_tdb: ["ecosysteme"]
    notes: "Tableau 2576. Note méthodologique 2009 : exclut travailleurs autonomes, T4 obligatoire."

  ventes_livres:
    label: "Variations mensuelles et annuelles des ventes de livres neufs"
    file_pattern: "Variations mensuelles*ventes de livres*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/variations-ventes-livres-neufs"
    classification: "OCCQ — données mensuelles, ventes finales, $ courants"
    extractor: extract_ventes_livres
    axe_tdb: ["consommation", "ecosysteme"]
    notes: "Hiérarchie : Ventes totales → Éditeurs / Distributeurs / Librairies → sous-catégories par type de librairie."

  etablissements:
    label: "Nombre d'établissements culturels de certains types"
    file_pattern: "Nombre d*établissements culturels*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/nombre-etablissements-culturels"
    classification: "OCCQ — séries annuelles 2004-2024 ; SCACCQ"
    extractor: extract_etablissements
    axe_tdb: ["presence", "ecosysteme"]
    notes: "Salles de spectacle, institutions muséales, centres d'artistes, lieux d'interprétation, etc."

  indicateurs_cinema:
    label: "Indicateurs des résultats d'exploitation des établissements cinématographiques (depuis 1975)"
    file_pattern: "Indicateurs des résultats d'exploitation*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/indicateurs-cinemas-quebec"
    classification: "OCCQ — séries annuelles 1975-"
    extractor: extract_indicateurs_cinema
    axe_tdb: ["presence", "consommation"]
    notes: "Projections, assistance, recettes, prix d'entrée moyen, entrées par habitant, etc."

# Configuration du tableau de bord
dashboard:
  title: "Souveraineté culturelle numérique au Québec"
  subtitle: "Tableau de bord empirique au regard de la Loi 109"
  template: "templates/dashboard.html.tmpl"
  output: "outputs/dashboard.html"
