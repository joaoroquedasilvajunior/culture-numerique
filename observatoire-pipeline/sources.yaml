# Manifeste des sources de données mobilisées par le Carnet de données — souveraineté culturelle numérique.
# (Anciennement « Observatoire de la souveraineté culturelle numérique » jusqu'au 2026-06-12.)
# Chaque entrée décrit un tableau ISQ attendu, son URL permanente, sa classification,
# et la fonction d'extraction qui le transforme en JSON normalisé.
#
# Convention de nommage : on accepte les noms tels qu'ils sont téléchargés de l'ISQ ; le pipeline
# repère les fichiers via un motif `file_pattern` (glob). Si plusieurs fichiers correspondent,
# le plus récent (selon mtime) est retenu, et le ledger trace lequel a été utilisé.
#
# Les URL sont indicatives : elles pointent vers les fiches ISQ correspondantes. Le pipeline ne
# les utilise pas pour télécharger automatiquement (l'accès est manuel).

# Dossier où le pipeline cherche les fichiers .xlsx ISQ. Chemin relatif à la racine du dépôt,
# ou absolu. Par défaut : ../Données Québec/ (un dossier au-dessus du dépôt) — c'est l'organisation
# recommandée : tu télécharges les fichiers ISQ dans Données Québec/, le pipeline les y trouve,
# pas de duplication, pas de divergence.
# Pour un setup self-contained classique, mettre simplement : raw_data_dir: "data/raw"
raw_data_dir: "../Données Québec"

sources:

  part_qc:
    label: "Part des interprètes du Québec dans la consommation d'enregistrements musicaux"
    isq_table_id: "4153"
    file_pattern: "Part des interprètes*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/part-interpretes-quebec-consommation-enregistrements-musicaux"
    classification: "OCCQ — données hebdomadaires"
    extractor: extract_part_qc
    axe_tdb: ["consommation"]

  volume_musique:
    label: "Consommation d'enregistrements musicaux selon le type de produit"
    isq_table_id: "2140"
    file_pattern: "Consommation d'enregistrements musicaux*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/consommation-enregistrements-musicaux-type-produit"
    classification: "OCCQ — données hebdomadaires"
    extractor: extract_volume_musique
    axe_tdb: ["consommation", "presence"]

  cinema_pays:
    label: "Résultats d'exploitation des établissements cinématographiques selon le pays d'origine des films (hebdomadaire)"
    isq_table_id: "3059"
    # Pattern resserré : « hebdomadaires » obligatoire pour éviter de matcher
    # le nouveau fichier annuel (cinema_pays_annuel) qui partage le préfixe.
    file_pattern: "Résultats d'exploitation des établissements*pays d'origine*hebdomadaires*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/resultats-exploitation-cinemas-pays-origine"
    classification: "OCCQ — données hebdomadaires"
    extractor: extract_cinema_pays
    axe_tdb: ["consommation"]

  palmares_top20:
    label: "Palmarès des enregistrements musicaux"
    isq_table_id: "2620"
    file_pattern: "Palmarès des enregistrements*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/palmares-enregistrements-musicaux"
    classification: "OCCQ — cumulatif annuel"
    extractor: extract_palmares
    axe_tdb: ["decouvrabilite"]

  evolution_stats:
    label: "Évolution de statistiques clés de la culture et des communications"
    isq_table_id: "3171"
    file_pattern: "Évolution de statistiques clés*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/evolution-statistiques-cles-culture-communications"
    classification: "OCCQ — séries annuelles 2002-2025"
    extractor: extract_evolution
    axe_tdb: ["presence", "ecosysteme"]

  emplois_eerh:
    label: "Emplois salariés dans certaines industries de la culture et des communications (EERH) — données mensuelles MM3"
    isq_table_id: "2576"
    # Pattern resserré : « données mensuelles » obligatoire pour ne plus matcher
    # le nouveau fichier annuel (emplois_eerh_annuel) qui partage le préfixe.
    file_pattern: "Emplois salariés*données mensuelles*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/2576"
    classification: "SCIAN 2022 — désaisonnalisé, MM3 ; année courante (YTD)"
    extractor: extract_emplois_eerh
    axe_tdb: ["ecosysteme"]
    notes: "Tableau 2576. Mois « (À venir) » tolérés ; l'extracteur calcule la variation Jan → dernier mois disponible et expose l'année de référence et le nombre de mois disponibles."

  emplois_eerh_annuel:
    label: "Emplois salariés dans certaines industries de la culture et des communications (EERH) — données annuelles 2001-2025"
    file_pattern: "Emplois salariés*données annuelles*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/emplois-salaries-culture-communications-annuel"
    classification: "SCIAN 2022 — moyennes annuelles 2001-"
    extractor: extract_emplois_eerh_annuel
    axe_tdb: ["ecosysteme"]
    notes: "Série annuelle EERH portée par le Québec. Sert de baseline figée pour les variations 2025 quand le fichier mensuel passe en année courante (YTD)."

  remunerations_eerh_statcan:
    label: "Rémunération hebdomadaire moyenne (EERH) — Québec, secteurs SCIAN 2 chiffres, mensuel désaisonnalisé"
    file_pattern: "14100223*.zip"
    isq_url: "https://www150.statcan.gc.ca/t1/tbl1/fr/tv.action?pid=1410022301"
    classification: "Statistique Canada CANSIM 14-10-0223 — EERH ; mensuel désaisonnalisé ; SCIAN 2 chiffres provincial"
    extractor: extract_remunerations_eerh_statcan
    axe_tdb: ["ecosysteme"]
    notes: "Source Statistique Canada (et non ISQ) parce que l'ISQ ne diffuse pas le volet rémunération de l'EERH pour le Québec dans le thème culture. Limite : granularité SCIAN 2 chiffres uniquement ([51] Information/culture, [71] Arts-spectacles-loisirs). Sert la lentille 3 « rémunération » de l'analyse AI-exposure, en complément des effectifs de emplois_eerh_annuel (qui descend au niveau 4 chiffres mais ne contient pas la rémunération)."

  ventes_livres:
    label: "Variations mensuelles et annuelles des ventes de livres neufs"
    isq_table_id: "2342"
    file_pattern: "Variations mensuelles*ventes de livres*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/variations-ventes-livres-neufs"
    classification: "OCCQ — données mensuelles, ventes finales, $ courants"
    extractor: extract_ventes_livres
    axe_tdb: ["consommation", "ecosysteme"]
    notes: "Hiérarchie : Ventes totales → Éditeurs / Distributeurs / Librairies → sous-catégories par type de librairie."

  ventes_categorie:
    label: "Ventes de livres neufs selon la catégorie de points de vente, données mensuelles"
    file_pattern: "Ventes de livres neufs*points de vente*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/2341"
    classification: "OCCQ — données mensuelles, $ courants, ventes finales"
    extractor: extract_ventes_categorie
    axe_tdb: ["consommation", "ecosysteme"]
    notes: "Série mensuelle ventilée par catégorie de points de vente : éditeurs, distributeurs, librairies (agréées / à succursales / indépendantes), grande diffusion. Tableau ISQ 2341."

  etablissements:
    label: "Nombre d'établissements culturels de certains types"
    isq_table_id: "929"
    file_pattern: "Nombre d*établissements culturels*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/nombre-etablissements-culturels"
    classification: "OCCQ — séries annuelles 2004-2024 ; SCACCQ"
    extractor: extract_etablissements
    axe_tdb: ["presence", "ecosysteme"]
    notes: "Salles de spectacle, institutions muséales, centres d'artistes, lieux d'interprétation, etc."

  indicateurs_cinema:
    label: "Indicateurs des résultats d'exploitation des établissements cinématographiques (depuis 1975)"
    isq_table_id: "2736"
    file_pattern: "Indicateurs des résultats d'exploitation*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/indicateurs-cinemas-quebec"
    classification: "OCCQ — séries annuelles 1975-"
    extractor: extract_indicateurs_cinema
    axe_tdb: ["presence", "consommation"]
    notes: "Projections, assistance, recettes, prix d'entrée moyen, entrées par habitant, etc."

  cinema_pays_annuel:
    label: "Résultats d'exploitation des établissements cinématographiques selon le pays d'origine des films — assistance annuelle"
    file_pattern: "Résultats d'exploitation des établissements*pays d'origine*annuelles*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/resultats-exploitation-cinemas-pays-origine-annuelles"
    classification: "OCCQ — séries annuelles 1985-"
    extractor: extract_cinema_pays_annuel
    axe_tdb: ["consommation", "presence"]
    notes: "Assistance (spectateurs) ventilée par pays d'origine du film, série annuelle 1985-. Donne directement le volume absolu — utile pour calculer C_cinema dans R3 sans recourir à une part hebdomadaire."

  cinema_langue:
    label: "Résultats d'exploitation des établissements cinématographiques selon la langue de projection"
    file_pattern: "Résultats d'exploitation des établissements*langue de projection*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/resultats-exploitation-cinemas-langue-projection"
    classification: "OCCQ — séries annuelles 1985-"
    extractor: extract_cinema_langue
    axe_tdb: ["presence"]
    notes: "Projections ventilées « Langue française » vs « Autres que le français » (chacune subdivisée Cinémas / Ciné-parcs). Indicateur direct du marché francophone — central pour la Loi 109."

  cinema_classement:
    label: "Résultats d'exploitation des établissements cinématographiques selon la catégorie de classement des films"
    file_pattern: "Résultats d'exploitation des établissements*catégorie de classement*.xlsx"
    isq_url: "https://statistique.quebec.ca/fr/produit/tableau/resultats-exploitation-cinemas-classement"
    classification: "OCCQ — séries annuelles 1985-"
    extractor: extract_cinema_classement
    axe_tdb: ["consommation"]
    notes: "Projections par classement RCQ (Visa général, 13+, 16+, 18+), série annuelle 1985-."

# Configuration du tableau de bord
dashboard:
  title: "Souveraineté culturelle numérique au Québec"
  subtitle: "Tableau de bord empirique au regard de la Loi 109"
  template: "templates/dashboard.html.tmpl"
  output: "outputs/dashboard.html"
